<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StreamIQ — AI Stream Advisor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0d0d12;--ink2:#3a3a4a;--ink3:#7a7a8a;
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efea;
  --accent:#ff4d1c;--accent2:#1c6eff;--border:#e2e1da;
  --radius:12px;--shadow:0 2px 16px rgba(0,0,0,0.08);
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.hero{background:var(--ink);color:#fff;padding:2.5rem 2rem 2rem;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% -20%,rgba(255,77,28,0.3),transparent 70%),radial-gradient(ellipse 40% 60% at 85% 110%,rgba(28,110,255,0.2),transparent 60%);}
.hero-tag{display:inline-block;background:var(--accent);color:#fff;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;padding:4px 12px;border-radius:100px;margin-bottom:0.75rem;font-weight:600;position:relative;}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;line-height:1.1;margin-bottom:0.6rem;position:relative;}
.hero h1 span{color:var(--accent);}
.hero p{color:rgba(255,255,255,0.55);font-size:0.95rem;max-width:480px;margin:0 auto;position:relative;}
.main{max-width:720px;margin:0 auto;padding:0 1.25rem 4rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;box-shadow:var(--shadow);margin-top:1.25rem;}
.section-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field label{font-size:13px;font-weight:500;color:var(--ink2);}
.field input,.field select{border:1.5px solid var(--border);border-radius:8px;padding:9px 13px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--ink);transition:border-color 0.15s;outline:none;}
.field input:focus,.field select:focus{border-color:var(--accent2);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.platform-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.pill{display:flex;align-items:center;gap:6px;border:1.5px solid var(--border);border-radius:8px;padding:8px 13px;font-size:13px;font-weight:500;cursor:pointer;background:var(--surface);transition:all 0.15s;user-select:none;}
.pill:hover{border-color:var(--ink2);}
.pill.active-twitch{border-color:#9146ff;background:#f5f0ff;color:#9146ff;}
.pill.active-youtube{border-color:#ff0000;background:#fff5f5;color:#cc0000;}
.pill.active-tiktok{border-color:#000;background:#f5f5f5;color:#000;}
.pill-icon{width:15px;height:15px;}
.time-ranges{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.time-range-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:8px;padding:9px 12px;}
.time-inputs{display:flex;align-items:center;gap:8px;flex:1;}
.time-inputs input[type="time"]{border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;transition:border-color 0.15s;cursor:pointer;flex:1;}
.time-inputs input[type="time"]:focus{border-color:var(--accent2);}
.time-sep{font-size:13px;color:var(--ink3);}
.time-preview{font-size:12px;color:var(--ink3);white-space:nowrap;min-width:110px;}
.remove-btn{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:18px;line-height:1;padding:2px 5px;border-radius:4px;transition:color 0.15s;}
.remove-btn:hover{color:var(--accent);}
.add-time-btn{display:flex;align-items:center;gap:6px;border:1.5px dashed var(--border);border-radius:8px;padding:9px 13px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;background:none;font-family:inherit;transition:all 0.15s;width:100%;}
.add-time-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.cta-btn{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;background:var(--accent);color:#fff;font-size:15px;font-weight:700;font-family:inherit;margin-top:1.25rem;transition:transform 0.1s,box-shadow 0.1s;}
.cta-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,77,28,0.35);}
.cta-btn:disabled{opacity:0.55;cursor:not-allowed;}
.loading-state{text-align:center;padding:2.5rem 1.5rem;}
.loader{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-steps{list-style:none;display:flex;flex-direction:column;gap:6px;margin-top:1.25rem;text-align:left;max-width:360px;margin-left:auto;margin-right:auto;}
.loading-steps li{font-size:13px;color:var(--ink3);display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
.loading-steps li.done{color:var(--ink2);}
.loading-steps li.active{color:var(--accent2);font-weight:500;}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;}
.loading-steps li.done .step-dot{background:#22c55e;}
.loading-steps li.active .step-dot{background:var(--accent2);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:100px;margin-bottom:0.6rem;}
.badge-game{background:#fff3f0;color:#cc3300;}
.badge-time{background:#f0f5ff;color:#1044aa;}
.badge-tip{background:#f0fff5;color:#15803d;}
.badge-channel{background:#fdf4ff;color:#7e22ce;}
.badge-live{background:#f0fff5;color:#15803d;display:inline-flex;align-items:center;gap:5px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;animation:pulse 1.5s infinite;}
.result-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:0.4rem;line-height:1.2;}
.result-sub{color:var(--ink3);font-size:14px;line-height:1.65;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:1rem 0;}
.stat-box{background:var(--surface2);border-radius:9px;padding:0.9rem;text-align:center;}
.stat-val{font-size:1.25rem;font-weight:700;color:var(--ink);}
.stat-key{font-size:11px;color:var(--ink3);margin-top:2px;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:1rem 0;}
.day-cell{border-radius:6px;padding:4px;text-align:center;font-size:11px;}
.day-cell .day-name{color:var(--ink3);font-size:10px;margin-bottom:3px;font-weight:600;}
.day-cell .day-bar{height:36px;border-radius:4px;background:var(--border);position:relative;overflow:hidden;margin:3px 0;}
.day-cell .day-bar-fill{position:absolute;bottom:0;left:0;right:0;background:var(--accent2);border-radius:4px;}
.day-cell .day-val{color:var(--ink2);font-weight:600;}
.competitor-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.competitor-row:last-child{border-bottom:none;}
.comp-rank{font-size:12px;color:var(--ink3);min-width:20px;font-weight:700;}
.comp-name{font-size:13px;font-weight:600;flex:1;}
.comp-stat{font-size:12px;color:var(--ink3);}
.comp-tag{font-size:11px;padding:2px 8px;border-radius:100px;font-weight:600;margin-left:6px;}
.comp-tag.grow{background:#f0fff5;color:#15803d;}
.comp-tag.sat{background:#fff3f0;color:#cc3300;}
.tip-row{display:flex;gap:10px;align-items:flex-start;padding:9px 0;}
.tip-bullet{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.tip-text{font-size:14px;line-height:1.6;color:var(--ink2);}
.tip-text strong{color:var(--ink);}
.backup-row{margin-top:10px;font-size:13px;color:var(--ink3);padding:10px 12px;background:var(--surface2);border-radius:8px;}
.source-row{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;}
.source-tag{font-size:11px;padding:3px 9px;border-radius:100px;border:1px solid var(--border);color:var(--ink3);background:var(--surface2);}
.chat-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.chat-header-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;}
.chat-header-text{font-size:13px;font-weight:600;color:var(--ink2);}
.chat-header-sub{font-size:12px;color:var(--ink3);}
.messages{display:flex;flex-direction:column;gap:10px;max-height:400px;overflow-y:auto;padding-right:4px;margin-bottom:12px;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.msg{display:flex;gap:8px;align-items:flex-start;}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.msg.ai .msg-avatar{background:var(--ink);color:#fff;}
.msg.user .msg-avatar{background:var(--accent);color:#fff;}
.msg-bubble{max-width:82%;padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.65;}
.msg.ai .msg-bubble{background:var(--surface2);color:var(--ink2);border-bottom-left-radius:4px;}
.msg.user .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
.msg-bubble strong{font-weight:600;}
.chat-typing{display:flex;gap:4px;align-items:center;padding:4px 0;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--ink3);animation:typing 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.quick-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.chip{border:1.5px solid var(--border);border-radius:100px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--ink2);transition:all 0.15s;font-family:inherit;}
.chip:hover{border-color:var(--accent2);color:var(--accent2);}
.chat-input-row{display:flex;gap:8px;}
.chat-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;transition:border-color 0.15s;resize:none;min-height:42px;}
.chat-input:focus{border-color:var(--accent2);}
.chat-send{border:none;background:var(--accent2);color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity 0.15s;white-space:nowrap;}
.chat-send:hover:not(:disabled){opacity:0.85;}
.chat-send:disabled{opacity:0.45;cursor:not-allowed;}
.reset-btn{width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink2);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:1rem;transition:all 0.15s;}
.reset-btn:hover{border-color:var(--ink);color:var(--ink);}
.error-box{background:#fff5f5;border:1px solid #ffd0d0;border-radius:10px;padding:1.25rem;color:#cc2200;font-size:14px;line-height:1.6;}
.notice-box{background:#f0f5ff;border:1px solid #c7d9ff;border-radius:10px;padding:1rem 1.25rem;font-size:13px;color:var(--ink2);line-height:1.6;margin-top:1.25rem;}
@media(max-width:520px){.field-row{grid-template-columns:1fr;}.stat-grid{grid-template-columns:1fr 1fr;}.day-grid{grid-template-columns:repeat(4,1fr);}}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">Live AI Analysis</div>
  <h1>Your <span>Personal</span><br>Stream Advisor</h1>
  <p>Real-time game & schedule recommendations from live data — then chat to refine your strategy.</p>
</div>

<div class="main" id="app"></div>

<script>
const NICHES=["FPS / Shooters","Battle Royale","RPG / Story","Survival / Sandbox","MOBA / Strategy","Sports / Racing","Horror","Casual / Family","Variety","Indie Games","Retro / Classic","Speedrunning"];
const QUICK_CHIPS=["Why this game specifically?","What days should I avoid?","How do I stand out from competitors?","Should I change my niche?","What's the best stream length?"];

let state={
  phase:"form",platform:"",handle:"",niche:"",extraInfo:"",
  timeSlots:[{id:1,start:"18:00",end:"22:00"}],nextId:2,
  result:null,error:"",messages:[],chatLoading:false,chatInput:""
};

function fmt(t){if(!t)return"";const[h,m]=t.split(":");const hr=parseInt(h);return`${hr%12||12}:${m} ${hr>=12?"PM":"AM"}`;}

function platformIcon(p){
  if(p==="twitch")return`<svg class="pill-icon" viewBox="0 0 24 24" fill="#9146ff"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>`;
  if(p==="youtube")return`<svg class="pill-icon" viewBox="0 0 24 24" fill="#ff0000"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>`;
  return`<svg class="pill-icon" viewBox="0 0 24 24" fill="#000"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05A6.34 6.34 0 0 0 3.15 15.3a6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.34-6.34V8.69a8.27 8.27 0 0 0 4.83 1.54V6.78a4.85 4.85 0 0 1-1.07-.09z"/></svg>`;
}

function platformURL(platform, handle){
  const u = handle.replace(/^@/,"");
  if(platform==="twitch") return `https://www.twitch.tv/${u}`;
  if(platform==="youtube") return `https://www.youtube.com/@${u}`;
  if(platform==="tiktok") return `https://www.tiktok.com/@${u}`;
  return "";
}

function twitchTrackerURL(handle){
  return `https://twitchtracker.com/${handle.replace(/^@/,"")}`;
}

function canSubmit(){return state.platform&&state.handle.trim()&&state.niche&&state.timeSlots.some(s=>s.start&&s.end);}

function render(){
  const app=document.getElementById("app");
  if(state.phase==="form")app.innerHTML=formHTML();
  else if(state.phase==="loading")app.innerHTML=loadingHTML();
  else app.innerHTML=resultHTML();
  bindEvents();
  if(state.phase==="result"){const m=document.querySelector(".messages");if(m)m.scrollTop=m.scrollHeight;}
}

function formHTML(){return`
<div class="card">
  <div class="section-label">Your Platform</div>
  <div class="platform-pills">
    ${["twitch","youtube","tiktok"].map(p=>`<div class="pill ${state.platform===p?`active-${p}`:""}" data-platform="${p}">${platformIcon(p)} ${p[0].toUpperCase()+p.slice(1)}</div>`).join("")}
  </div>
  ${state.platform?`<div class="field" style="margin-top:12px"><label>${state.platform==="twitch"?"Twitch Username":state.platform==="youtube"?"YouTube Channel Name":"TikTok Username"}</label><input type="text" id="handle" placeholder="@username or channel name" value="${state.handle}"/></div>`:""}
</div>
<div class="card">
  <div class="section-label">Your Content</div>
  <div class="field-row">
    <div class="field"><label>Your Niche</label><select id="niche"><option value="">— Select a niche —</option>${NICHES.map(n=>`<option value="${n}"${state.niche===n?" selected":""}>${n}</option>`).join("")}</select></div>
    <div class="field"><label>Sub-niche / extra info <span style="color:var(--ink3);font-weight:400">(optional)</span></label><input type="text" id="extraInfo" placeholder="e.g. competitive, chill vibes" value="${state.extraInfo}"/></div>
  </div>
</div>
<div class="card">
  <div class="section-label">When Are You Available?</div>
  <p style="font-size:13px;color:var(--ink3);margin-bottom:12px">Add your available streaming windows — we'll find the best one.</p>
  <div class="time-ranges">
    ${state.timeSlots.map(s=>`
    <div class="time-range-row">
      <div class="time-inputs">
        <input type="time" class="start-time" data-id="${s.id}" value="${s.start}"/>
        <span class="time-sep">to</span>
        <input type="time" class="end-time" data-id="${s.id}" value="${s.end}"/>
        <span class="time-preview">${s.start&&s.end?`${fmt(s.start)} – ${fmt(s.end)}`:""}</span>
      </div>
      ${state.timeSlots.length>1?`<button class="remove-btn" data-id="${s.id}">×</button>`:""}
    </div>`).join("")}
  </div>
  <button class="add-time-btn" id="addSlot">＋ Add another time window</button>
</div>
<button class="cta-btn" id="analyzeBtn" ${canSubmit()?"":"disabled"}>Analyse My Channel & Find Best Setup →</button>
<div class="notice-box">🔍 <strong>Live search enabled</strong> — we'll fetch your current channel page and real-time game data from TwitchTracker, SullyGnome, and StreamsCharts right now.</div>`;}

function loadingHTML(){return`
<div class="card loading-state">
  <div class="loader"></div>
  <p style="font-weight:600;font-size:15px">Running live analysis...</p>
  <ul class="loading-steps">
    <li id="ls1"><span class="step-dot"></span>Fetching <strong>${state.handle}</strong>'s live channel page</li>
    <li id="ls2"><span class="step-dot"></span>Scraping TwitchTracker for real-time stats</li>
    <li id="ls3"><span class="step-dot"></span>Searching trending games in ${state.niche}</li>
    <li id="ls4"><span class="step-dot"></span>Pulling viewer peak & competitor data</li>
    <li id="ls5"><span class="step-dot"></span>Building your personalised strategy</li>
  </ul>
</div>`;}

function resultHTML(){
  if(state.error)return`<div class="card"><div class="error-box">⚠ ${state.error}</div></div><button class="reset-btn" id="resetBtn">← Try Again</button>`;
  const r=state.result;
  const maxV=r.dayData?Math.max(...r.dayData.map(d=>d.v),1):100;
  return`
<div class="card">
  <span class="badge badge-live"><span class="live-dot"></span>Live Channel Data</span>
  <div style="font-size:14px;color:var(--ink2);line-height:1.7">${r.channelInsight}</div>
  ${r.channelStats?`<div class="stat-grid" style="margin-top:1rem">${r.channelStats.map(s=>`<div class="stat-box"><div class="stat-val">${s.val}</div><div class="stat-key">${s.key}</div></div>`).join("")}</div>`:""}
  ${r.dataSources?`<div class="source-row">${r.dataSources.map(s=>`<span class="source-tag">📡 ${s}</span>`).join("")}</div>`:""}
</div>
<div class="card">
  <span class="badge badge-game">Best Game Pick</span>
  <div class="result-title">${r.game}</div>
  <div class="result-sub">${r.gameReason}</div>
  ${r.gameStats?`<div class="stat-grid">${r.gameStats.map(s=>`<div class="stat-box"><div class="stat-val">${s.val}</div><div class="stat-key">${s.key}</div></div>`).join("")}</div>`:""}
  ${r.dayData?`
  <div style="font-size:11px;color:var(--ink3);margin-bottom:6px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase">Viewer activity by day</div>
  <div class="day-grid">${r.dayData.map(d=>`<div class="day-cell"><div class="day-name">${d.day}</div><div class="day-bar"><div class="day-bar-fill" style="height:${Math.round((d.v/maxV)*100)}%"></div></div><div class="day-val">${d.v}K</div></div>`).join("")}</div>`:""}
  ${r.competitors?`
  <div style="font-size:11px;color:var(--ink3);margin:1rem 0 6px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase">Top competitors in this game</div>
  ${r.competitors.map((c,i)=>`<div class="competitor-row"><span class="comp-rank">#${i+1}</span><span class="comp-name">${c.name}</span><span class="comp-stat">${c.viewers}</span><span class="comp-tag ${c.sat?"sat":"grow"}">${c.sat?"Saturated":"Growing"}</span></div>`).join("")}`:""}
  ${r.backupGame?`<div class="backup-row">🔀 <strong>Runner-up:</strong> ${r.backupGame} — ${r.backupReason}</div>`:""}
</div>
<div class="card">
  <span class="badge badge-time">Optimal Stream Time</span>
  <div class="result-title">${r.bestTime}</div>
  <div class="result-sub">${r.timeReason}</div>
</div>
<div class="card">
  <span class="badge badge-tip">Personalised Growth Tips</span>
  ${r.tips.map((t,i)=>`<div class="tip-row"><div class="tip-bullet">${i+1}</div><div class="tip-text">${t}</div></div>`).join("")}
</div>
<div class="card">
  <div class="chat-header">
    <div class="chat-header-dot"></div>
    <div>
      <div class="chat-header-text">Ask your AI stream advisor anything</div>
      <div class="chat-header-sub">Refine your strategy, explore other games, get deeper insights</div>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="msg ai"><div class="msg-avatar">AI</div><div class="msg-bubble">I just pulled your live channel data and ran a real-time analysis. Ask me anything to dig deeper — why I picked this game, what days are worst, how to beat the competition, or whether to change your niche. 🎮</div></div>
    ${state.messages.map(m=>`<div class="msg ${m.role==="user"?"user":"ai"}"><div class="msg-avatar">${m.role==="user"?"You":"AI"}</div><div class="msg-bubble">${m.content}</div></div>`).join("")}
    ${state.chatLoading?`<div class="msg ai"><div class="msg-avatar">AI</div><div class="msg-bubble"><div class="chat-typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`:""}
  </div>
  <div class="quick-chips">${QUICK_CHIPS.map(c=>`<button class="chip" data-chip="${c}">${c}</button>`).join("")}</div>
  <div class="chat-input-row">
    <textarea class="chat-input" id="chatInput" rows="1" placeholder="Ask a follow-up question...">${state.chatInput}</textarea>
    <button class="chat-send" id="chatSend" ${state.chatLoading?"disabled":""}>Send →</button>
  </div>
</div>
<button class="reset-btn" id="resetBtn">← Start Over</button>`;}

function bindEvents(){
  document.querySelectorAll(".pill").forEach(p=>p.addEventListener("click",()=>{state.platform=p.dataset.platform;state.handle="";render();}));
  const h=document.getElementById("handle");if(h)h.addEventListener("input",e=>{state.handle=e.target.value;updateBtn();});
  const n=document.getElementById("niche");if(n)n.addEventListener("change",e=>{state.niche=e.target.value;updateBtn();});
  const x=document.getElementById("extraInfo");if(x)x.addEventListener("input",e=>{state.extraInfo=e.target.value;});
  document.querySelectorAll(".start-time").forEach(el=>el.addEventListener("change",e=>{const s=state.timeSlots.find(s=>s.id===parseInt(e.target.dataset.id));if(s){s.start=e.target.value;render();}}));
  document.querySelectorAll(".end-time").forEach(el=>el.addEventListener("change",e=>{const s=state.timeSlots.find(s=>s.id===parseInt(e.target.dataset.id));if(s){s.end=e.target.value;render();}}));
  document.querySelectorAll(".remove-btn").forEach(el=>el.addEventListener("click",e=>{state.timeSlots=state.timeSlots.filter(s=>s.id!==parseInt(e.target.dataset.id));render();}));
  const add=document.getElementById("addSlot");if(add)add.addEventListener("click",()=>{state.timeSlots.push({id:state.nextId++,start:"",end:""});render();});
  const btn=document.getElementById("analyzeBtn");if(btn)btn.addEventListener("click",analyze);
  const rst=document.getElementById("resetBtn");if(rst)rst.addEventListener("click",()=>{state={phase:"form",platform:"",handle:"",niche:"",extraInfo:"",timeSlots:[{id:1,start:"18:00",end:"22:00"}],nextId:2,result:null,error:"",messages:[],chatLoading:false,chatInput:""};render();});
  const ci=document.getElementById("chatInput");
  if(ci){
    ci.addEventListener("input",e=>{state.chatInput=e.target.value;ci.style.height="auto";ci.style.height=Math.min(ci.scrollHeight,120)+"px";});
    ci.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}});
  }
  const cs=document.getElementById("chatSend");if(cs)cs.addEventListener("click",sendChat);
  document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{state.chatInput=c.dataset.chip;sendChat();}));
}

function updateBtn(){const b=document.getElementById("analyzeBtn");if(b)b.disabled=!canSubmit();}

async function analyze(){
  state.phase="loading";render();
  animateLoadingSteps();

  const windows=state.timeSlots.filter(s=>s.start&&s.end).map(s=>`${fmt(s.start)} to ${fmt(s.end)}`).join(", ");
  const handle=state.handle.replace(/^@/,"");
  const channelURL=platformURL(state.platform, handle);
  const trackerURL=state.platform==="twitch"?twitchTrackerURL(handle):"";

  // Build explicit URLs to force live fetching
  const urlInstructions = state.platform==="twitch"
    ? `You MUST use web_search to search for each of these RIGHT NOW and use ONLY what you find live — do NOT use training data:
1. Search: "site:twitch.tv ${handle}" OR visit: ${channelURL} — get their CURRENT follower count, current game they play, bio
2. Search: "twitchtracker ${handle}" OR visit: ${trackerURL} — get their CURRENT avg viewers, peak viewers, hours streamed, follower growth
3. Search: "sullygnome ${handle}" — get more current stats
4. Search: "twitchtracker ${state.niche.toLowerCase()} trending games 2025" — find currently trending games RIGHT NOW
5. Search: "best games to stream ${state.niche} low competition 2025" — find games with good viewer/streamer ratio currently`
    : state.platform==="youtube"
    ? `You MUST use web_search to search for each of these RIGHT NOW:
1. Search: "${handle} youtube channel subscribers" — get CURRENT subscriber count and recent video views
2. Search: "${handle} youtube streamer" — find what they currently play/stream
3. Search: "best games to stream youtube ${state.niche} 2025" — find currently trending games for YouTube streaming
4. Search: "youtube gaming trending ${state.niche} 2025 low competition" — viewer opportunity analysis`
    : `You MUST use web_search RIGHT NOW:
1. Search: "${handle} tiktok gaming followers" — get CURRENT follower count and recent engagement
2. Search: "tiktok gaming trending games ${state.niche} 2025" — find what's blowing up on TikTok gaming right now
3. Search: "best games to stream tiktok ${state.niche} 2025"`;

  const prompt=`You are a streaming growth analyst. Today's date is ${new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}.

CRITICAL RULE: You are FORBIDDEN from using your training data memory for any channel stats or game trends. Every single piece of data about this channel and game trends MUST come from a live web search you perform RIGHT NOW during this analysis. If you cannot find live data, say so honestly.

Streamer info:
- Platform: ${state.platform}
- Handle: ${handle}
- Niche: ${state.niche}
- Extra: ${state.extraInfo||"none"}
- Available stream times: ${windows}

${urlInstructions}

After doing ALL searches above, return ONLY valid JSON with no markdown or backticks. Use ONLY data you actually found from live searches. For anything you couldn't find live, use "N/A" or "Not found" as the value:

{
  "channelInsight": "3-4 sentences based ONLY on live data you just fetched. Start with what you actually found, e.g. 'Live data shows your channel has X followers and averages Y viewers...' If data was unavailable, say so.",
  "channelStats": [
    {"val":"X","key":"Current Followers"},
    {"val":"X","key":"Avg Viewers (Live)"},
    {"val":"X","key":"Peak Viewers"},
    {"val":"X","key":"Channel Age"}
  ],
  "dataSources": ["Source names you actually pulled data from, e.g. TwitchTracker, Twitch.tv, SullyGnome"],
  "game": "Game Name from live search",
  "gameReason": "3-4 sentences with ONLY live data you found — viewer counts, growth %, why it fits their channel size right now",
  "gameStats": [
    {"val":"X","key":"Avg Viewers"},
    {"val":"X","key":"Viewer:Streamer Ratio"},
    {"val":"X","key":"30-Day Growth"},
    {"val":"X","key":"Active Streamers"},
    {"val":"X","key":"Discoverability"},
    {"val":"X","key":"Avg Session"}
  ],
  "dayData":[
    {"day":"Mon","v":38},{"day":"Tue","v":42},{"day":"Wed","v":45},
    {"day":"Thu","v":41},{"day":"Fri","v":68},{"day":"Sat","v":82},{"day":"Sun","v":74}
  ],
  "competitors":[
    {"name":"Real streamer name from search","viewers":"~X avg","sat":false},
    {"name":"Real streamer name","viewers":"~X avg","sat":true},
    {"name":"Real streamer name","viewers":"~X avg","sat":false}
  ],
  "backupGame":"Another game from live search",
  "backupReason":"Short reason based on live data",
  "bestTime":"e.g. 8:00 PM – 11:00 PM",
  "timeReason":"2-3 sentences on why this window is best for this niche based on live viewer peak data",
  "tips":[
    "Tip with <strong>key point bolded</strong> — based on their actual channel data",
    "Tip 2 personalised to their size and niche",
    "Tip 3",
    "Tip 4"
  ]
}`;

  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:2500,
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        messages:[{role:"user",content:prompt}]
      })
    });
    const data=await resp.json();
    const text=data.content.map(b=>b.type==="text"?b.text:"").join("");
    const clean=text.replace(/```json|```/g,"").trim();
    const si=clean.indexOf("{"),ei=clean.lastIndexOf("}");
    state.result=JSON.parse(clean.slice(si,ei+1));
    state.phase="result";
  }catch(e){
    state.error="Something went wrong — please try again. ("+e.message+")";
    state.phase="result";
  }
  render();
}

function animateLoadingSteps(){
  const ids=["ls1","ls2","ls3","ls4","ls5"];
  let i=0;
  const tick=()=>{
    if(state.phase!=="loading")return;
    if(i>0){const p=document.getElementById(ids[i-1]);if(p){p.classList.remove("active");p.classList.add("done");}}
    if(i<ids.length){const c=document.getElementById(ids[i]);if(c)c.classList.add("active");}
    i++;
    if(i<=ids.length)setTimeout(tick,2200);
  };
  setTimeout(tick,300);
}

async function sendChat(){
  const input=state.chatInput.trim();
  if(!input||state.chatLoading)return;
  state.messages.push({role:"user",content:input});
  state.chatInput="";
  state.chatLoading=true;
  render();
  const r=state.result;
  const history=state.messages.slice(0,-1).map(m=>`${m.role==="user"?"Streamer":"Advisor"}: ${m.content}`).join("\n");
  const prompt=`You are an expert streaming growth advisor. Today's date is ${new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}.

Context from the live analysis just completed:
- Platform: ${state.platform} | Handle: ${state.handle} | Niche: ${state.niche}
- Recommended game: ${r.game} | Best time: ${r.bestTime}
- Channel insight: ${r.channelInsight}
- Game reason: ${r.gameReason}
- Tips: ${r.tips.join(" | ")}
- Backup game: ${r.backupGame}
- Data sources used: ${r.dataSources?r.dataSources.join(", "):""}
${history?`\nConversation so far:\n${history}`:""}

Streamer's question: "${input}"

IMPORTANT: If the question needs current data (new games, recent trends, current stats), use web_search to get it live RIGHT NOW — do not rely on memory.

Answer in a conversational, specific, helpful way. Under 200 words. Use <strong> for key points. Be direct and actionable.`;

  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:600,
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        messages:[{role:"user",content:prompt}]
      })
    });
    const data=await resp.json();
    const reply=data.content.map(b=>b.type==="text"?b.text:"").join("").trim();
    state.messages.push({role:"ai",content:reply||"Sorry, couldn't get a response. Please try again."});
  }catch(e){
    state.messages.push({role:"ai",content:"Something went wrong. Please try again."});
  }
  state.chatLoading=false;
  render();
}

render();
</script>
</body>
